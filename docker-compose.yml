version: '3.8'

services:
  web:
    build: .
    ports:
      - "5173:5173"
    volumes:
      # 掛載目前目錄到容器內的 /app，實現熱重載 (HMR)
      - .:/app
      # 忽略本機的 node_modules，避免與容器內的環境衝突
      - /app/node_modules
    environment:
      # 在 Windows 上使用 Docker 掛載目錄時，啟用輪詢機制以確保檔案變更可以被 Vite 偵測到
      - CHOKIDAR_USEPOLLING=true
      # 確保 Vite 可以在 Docker 內被外部存取
      - VITE_HOST=0.0.0.0
    restart: unless-stopped
