schema: spec-driven

context: |
  # 專案總覽
  
  ## 一、 專案背景
  本專案為翔盛五金的 B2B 電子商務與產品型錄平台，旨在提供企業客戶直觀、高效的工具與五金採購體驗。
  
  ## 二、 核心功能
  1. 產品瀏覽與搜尋
  2. 購物車與詢價單功能
  3. 響應式介面(RWD)
  4. 多語系切換(中/英)
  5. 會員登入/登出/修改密碼/忘記密碼 功能
  6. 公告功能
  7. 聯繫我們功能(LINE QRCODE、聯絡電話、 Email)
  8. 網站導覽列(首頁、型錄、公告、聯繫我們、會員登入)
  9. footer 相關資訊
  10. 麵包屑(Breadcrumb)功能
  
  ## 三、 系統架構
  * **前端**：React 18
  * **後端**：Vite
  * **資料庫**：MongoDB
  * **其他**：Redis, Docker, Nginx
  
  ## 四、 備註
  （其他特殊需求或限制）
